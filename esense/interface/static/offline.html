<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esense — Nodo apagado</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: "Monaco", "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      margin: 0;
      padding: 20px;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    h1 {
      color: #7c6af7;
      font-size: 1.2rem;
      margin: 0;
      font-weight: 400;
      letter-spacing: 1px;
    }
    p {
      color: #888;
      font-size: 0.9rem;
      margin: 0;
      max-width: 320px;
    }
    code {
      background: #141414;
      color: #7c6af7;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #222;
      display: inline-block;
      margin-top: 8px;
    }
    .status-icon {
      display: inline-block;
      width: 48px;
      height: 48px;
      background: #141414;
      border: 2px solid #333;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 1.5rem;
    }
    button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: "Monaco", "Courier New", monospace;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    button:hover {
      background: #9a88ff;
    }
    button:active {
      background: #6858d9;
    }
    .hint {
      font-size: 0.8rem;
      color: #555;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-icon">⊘</div>
    <h1>esense node</h1>
    <p>El nodo está apagado.</p>
    <code>./start.sh</code>
    <button onclick="location.reload()">Reintentar</button>
    <div class="hint">El agente responde desde tu máquina local — inicializá el nodo para conectarte.</div>
  </div>
</body>
</html>
